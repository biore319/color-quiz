<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>慣用色名クイズ</title>

<style>
body {
  font-family: "Arial Rounded MT Bold", "Noto Sans JP", sans-serif;
  background: linear-gradient(135deg, #ffe0ec, #d0f0ff);
  text-align: center;
  padding: 20px;
}

.container {
  background: rgba(255,255,255,0.9);
  border-radius: 25px;
  padding: 30px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

#colorBox {
  width: 140px;
  height: 140px;
  margin: 20px auto;
  border-radius: 15px;
  border: 3px solid #fff;
}

.choice {
  display: block;
  margin: 8px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #f3f3f3;
  cursor: pointer;
  font-weight: bold;
}

.choice:hover {
  background: #ffd1dc;
}

.correct { background: #b6f5c1; }
.wrong { background: #ffb3b3; }

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: #ffb6c1;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎨 慣用色名クイズ</h1>

  <p>スコア：<span id="score">0</span></p>

  <div id="colorBox"></div>
  <div id="choices"></div>

  <button onclick="showHint()">ヒント</button>
  <div id="hint"></div>

  <div id="result"></div>
  <div id="explanation"></div>

  <button onclick="nextQuestion()">次の問題</button>
  <button onclick="showReview()">間違い一覧</button>
  <button onclick="startReview()">復習モード</button>

  <div id="review"></div>
</div>

<script>

const colors = [
  {name:"桜色",color:"#ffd1dc",hint:"淡いピンク",ex:"桜の花"},
  {name:"山吹色",color:"#f8b500",hint:"黄色",ex:"山吹の花"},
  {name:"藍色",color:"#165e83",hint:"濃い青",ex:"伝統色"},
  {name:"エメラルド",color:"#50c878",hint:"宝石緑",ex:"宝石の色"},
  {name:"ラベンダー",color:"#e6e6fa",hint:"薄紫",ex:"花の色"},
  {name:"チャコールグレー",color:"#36454f",hint:"濃い灰色",ex:"炭の色"}
];

let current;
let score = 0;
let wrongList = [];
let reviewMode = false;
let reviewIndex = 0;

function showHint() {
  document.getElementById("hint").innerText = "ヒント：" + current.hint;
}

function generateQuestion() {
  if (reviewMode) {
    loadReviewQuestion();
    return;
  }

  current = colors[Math.floor(Math.random() * colors.length)];
  drawQuestion();
}

function loadReviewQuestion() {
  if (reviewIndex >= wrongList.length) {
    alert("復習おわり！");
    reviewMode = false;
    return;
  }

  current = wrongList[reviewIndex];
  drawQuestion();
}

function drawQuestion() {
  document.getElementById("colorBox").style.background = current.color;
  document.getElementById("hint").innerText = "";

  let choices = [current.name];

  while (choices.length < 4) {
    let r = colors[Math.floor(Math.random() * colors.length)].name;
    if (!choices.includes(r)) choices.push(r);
  }

  choices.sort(() => Math.random() - 0.5);

  let html = "";
  choices.forEach(c => {
    html += `<button class="choice" onclick="checkAnswer('${c}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("result").innerText = "";
  document.getElementById("explanation").innerText = "";
}

function checkAnswer(ans) {
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => {
    if (btn.innerText === current.name) btn.classList.add("correct");
    else if (btn.innerText === ans) btn.classList.add("wrong");
    btn.disabled = true;
  });

  if (ans === current.name) {
    score++;
    document.getElementById("result").innerText = "⭕ 正解！";
  } else {
    document.getElementById("result").innerText =
      "❌ 正解は「" + current.name + "」";

    wrongList.push(current);
  }

  document.getElementById("score").innerText = score;
  document.getElementById("explanation").innerText =
    "解説：" + current.ex;

  if (reviewMode) reviewIndex++;
}

function nextQuestion() {
  generateQuestion();
}

function showReview() {
  let html = "<h3>📚 間違い一覧</h3>";

  if (wrongList.length === 0) {
    html += "まだ間違いなし！✨";
  } else {
    wrongList.forEach(item => {
      html += `
        <div style="margin:10px;padding:10px;background:#fff;border-radius:10px;">
          <div style="width:40px;height:40px;background:${item.color};margin:auto;"></div>
          <div>${item.name}</div>
        </div>
      `;
    });
  }

  document.getElementById("review").innerHTML = html;
}

function startReview() {
  if (wrongList.length === 0) {
    alert("復習する問題がないよ！");
    return;
  }

  reviewMode = true;
  reviewIndex = 0;
  generateQuestion();
}

generateQuestion();

</script>

</body>
</html>
